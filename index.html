<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple task tracker app to manage your daily tasks">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>📋 Task Tracker</h1>
      <p class="subtitle">Stay organized. Get things done.</p>
    </header>

    <!-- Add Task Form -->
    <form id="task-form" class="task-form">
      <input type="text" id="task-input" class="task-input" placeholder="What do you need to do?">
      <button type="submit" id="add-btn" class="btn btn-add">Add Task</button>
    </form>
    <!-- Validation Message (hidden by default) -->
    <p id="validation-msg" class="validation-msg hidden">⚠️ Please enter a task before adding.</p>

    <!-- Filter Buttons -->
    <div class="filter-bar">
      <button class="btn btn-filter active" data-filter="all">All</button>
      <button class="btn btn-filter" data-filter="active">Active</button>
      <button class="btn btn-filter" data-filter="completed">Completed</button>
      <span id="task-count" class="task-count">0 tasks</span>
    </div>

    <!-- Task List -->
    <ul id="task-list" class="task-list"></ul>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <span class="empty-icon">🎯</span>
      <p>No tasks yet. Add one above!</p>
    </div>

     <!-- Footer -->
     <footer class="app-footer">
      <p>&copy; 2026 Task Tracker. All rights reserved.</p>
     </footer>

  </div>

  <script src="js/app.js"></script>
</body>

</html>
